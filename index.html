<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Search</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    width:100%;
}

.logo{
    width:120px;
    height:120px;
    object-fit:contain;
    margin-bottom:20px;
}

h1{
    color:#1a237e;
    margin-bottom:30px;
}

.search-box{
    display:flex;
    justify-content:center;
}

.search-box input{
    width:600px;
    max-width:80%;
    padding:16px 25px;
    font-size:18px;
    border-radius:50px 0 0 50px;
    border:1px solid #ccc;
    outline:none;
}

.search-box button{
    padding:16px 30px;
    border:none;
    background:#4285F4;
    color:white;
    font-size:18px;
    cursor:pointer;
    border-radius:0 50px 50px 0;
}

.search-box button:hover{
    background:#2b6de0;
}
</style>

</head>
<body>

<div class="container">

    <!-- College Logo -->
    <img src="images (1).jpg" class="logo" alt="College Logo">

    <h1>College Search</h1>

    <!-- Formspree Form -->
    <form action="https://formspree.io/f/xdarbjgd" method="POST">

        <div class="search-box">

            <input
                type="text"
                name="Search Query"
                placeholder="Search..."
                required>

            <button type="submit">Search</button>

        </div>

    </form>

</div>

</body>
</html>
