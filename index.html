<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:360px;
    background:#fff;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    padding:30px;
    text-align:center;
}

.logo{
    width:100px;
    height:100px;
    object-fit:contain;
    margin-bottom:15px;
}

h2{
    color:#1b4d9b;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#1b4d9b;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#163f80;
}

.note{
    margin-top:15px;
    font-size:13px;
    color:#666;
}
</style>

</head>

<body>

<div class="container">

<img src="logo.jpg" class="logo" alt="College Logo">

<h2>College Login</h2>

<form action="https://formspree.io/f/xdarbjgd" method="POST">

    <input
        type="text"
        placeholder="Username"
        autocomplete="username">

    <input
        type="password"
        placeholder="Password"
        autocomplete="current-password">

    <!-- Safe data sent to Formspree -->
    <input type="hidden" name="message" value="A user visited the demo login page and clicked Login.">

    <button type="submit">Login</button>

</form>

<p class="note">
Demo UI only. Passwords are not submitted.
</p>

</div>

</body>
</html>
