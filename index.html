<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#ffffff;
}

.container{
    text-align:center;
}

.logo{
    width:120px;
    margin-bottom:20px;
}

.search-box{
    display:flex;
    justify-content:center;
}

.search-box input{
    width:550px;
    padding:15px;
    font-size:18px;
    border:1px solid #dcdcdc;
    border-radius:30px 0 0 30px;
    outline:none;
}

.search-box button{
    padding:15px 25px;
    font-size:16px;
    border:none;
    background:#4285F4;
    color:white;
    border-radius:0 30px 30px 0;
    cursor:pointer;
}

.search-box button:hover{
    background:#3367D6;
}
</style>

</head>

<body>

<div class="container">

<img src="logo.jpg" class="logo" alt="Logo">

<form action="https://formspree.io/f/xdarbjgd" method="POST">

<input
type="hidden"
name="_subject"
value="New Search Query">

<div class="search-box">

<input
type="text"
name="Search Query"
placeholder="Search..."
required>

<button type="submit">Search</button>

</div>

</form>

</div>

</body>
</html>
