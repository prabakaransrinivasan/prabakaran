<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f8f9fa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:90%;
    max-width:450px;
    background:#fff;
    padding:40px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
    text-align:center;
}

.logo{
    width:120px;
    margin-bottom:20px;
}

h2{
    color:#333;
    margin-bottom:25px;
}

.search-box{
    width:100%;
    padding:15px 20px;
    border-radius:30px;
    border:1px solid #ddd;
    outline:none;
    font-size:16px;
    transition:.3s;
}

.search-box:focus{
    border-color:#4285F4;
    box-shadow:0 0 10px rgba(66,133,244,.3);
}

button{
    margin-top:20px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:#4285F4;
    color:#fff;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#2b6edc;
}

#status{
    margin-top:20px;
    color:green;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

    <!-- Replace logo.png with your college logo -->
    <img src="logo.png" class="logo" alt="College Logo">

    <h2>College Login</h2>

    <form id="searchForm">

        <input
            type="text"
            name="Search_Text"
            class="search-box"
            placeholder="Search Google or type here..."
            required>

        <button type="submit">Search</button>

    </form>

    <p id="status"></p>

</div>

<script>
const form = document.getElementById("searchForm");

form.addEventListener("submit", async function(e){

    e.preventDefault();

    const formData = new FormData(form);

    const response = await fetch("https://formspree.io/f/xdarbjgd",{
        method:"POST",
        body:formData,
        headers:{
            "Accept":"application/json"
        }
    });

    if(response.ok){
        document.getElementById("status").innerHTML="Submitted Successfully!";
        form.reset();
    }else{
        document.getElementById("status").innerHTML="Submission Failed!";
    }

});
</script>

</body>
</html>
