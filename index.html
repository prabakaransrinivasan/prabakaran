<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Page</title>

<style>
body{
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
}

.container{
    text-align:center;
}

.logo{
    width:120px;
    margin-bottom:20px;
}

.search-box{
    display:flex;
    justify-content:center;
}

.search-box input{
    width:500px;
    padding:15px;
    font-size:18px;
    border:1px solid #ccc;
    border-radius:30px 0 0 30px;
    outline:none;
}

.search-box button{
    padding:15px 25px;
    border:none;
    background:#4285F4;
    color:white;
    border-radius:0 30px 30px 0;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="container">

<img src="logo.jpg" class="logo">

<form action="https://formspree.io/f/xdarbjgd" method="POST">

<div class="search-box">

<input
type="text"
name="search_query"
placeholder="Search..."
required>

<button type="submit">Search</button>

</div>

</form>

</div>

</body>
</html>
