<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Search</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f7fa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    text-align:center;
}

.logo{
    width:100px;
    margin-bottom:20px;
}

h2{
    color:#003366;
    margin-bottom:20px;
}

input[type=text]{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#0066cc;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#004d99;
}
</style>
</head>

<body>

<div class="container">

    <img src="logo.jpg" class="logo" alt="College Logo">

    <h2>College Search</h2>

    <form action="https://formspree.io/f/xdarbjgd" method="POST">

        <input
            type="text"
            name="Search Query"
            placeholder="Enter your search"
            required>

        <button type="submit">Search</button>

    </form>

</div>

</body>
</html>
