<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f7fa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:360px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    text-align:center;
}

.logo{
    width:100px;
    margin-bottom:15px;
}

h2{
    color:#003366;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#0066cc;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0052a3;
}
</style>
</head>

<body>

<div class="login-box">

<img src="logo.jpg" class="logo" alt="College Logo">

<h2>College Login</h2>

<form action="https://formspree.io/f/xdarbjgd" method="POST">

    <!-- Demo fields (not submitted) -->
    <input type="text" placeholder="Username" autocomplete="username">
    <input type="password" placeholder="Password" autocomplete="current-password">

    <!-- Safe message sent to Formspree -->
    <input type="hidden" name="message" value="Demo login page accessed.">

    <button type="submit">Login</button>

</form>

</div>

</body>
</html>
